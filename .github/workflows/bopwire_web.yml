# Build + typecheck the WASM web player on every push that touches its
# sources or the crypto / libwally bits it links against. Artifact is the
# vite dist/ tree so we can grab a deployable bundle from any green run.
name: bopwire_web

on:
  push:
    paths:
      - 'bopwire_web/**'
      - 'bopwire/deps/libwally-core/**'
      - 'bopwire/src/crypto/**'
      - '.github/workflows/bopwire_web.yml'
  pull_request:
    paths:
      - 'bopwire_web/**'
      - 'bopwire/deps/libwally-core/**'
      - 'bopwire/src/crypto/**'
      - '.github/workflows/bopwire_web.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pinned emsdk for reproducibility. 3.1.64 is the last 3.1.x and
      # matches what the local build.sh has been tested against.
      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache-3.1.64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bopwire_web/package-lock.json

      - name: Install build tooling (cmake, ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build WASM modules (wallet.js / wallet.wasm)
        working-directory: bopwire_web
        run: bash build.sh

      - name: npm ci
        working-directory: bopwire_web
        run: npm ci

      - name: Typecheck
        working-directory: bopwire_web
        run: npm run typecheck

      - name: Vite build
        working-directory: bopwire_web
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: bopwire_web-dist
          path: bopwire_web/dist/
          if-no-files-found: error
          retention-days: 14
