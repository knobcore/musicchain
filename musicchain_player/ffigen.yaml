name: MusicChainBindings
description: Auto-generated FFI bindings for libmusicchain C API.
output: lib/src/ffi/bindings.dart

llvm-path:
  - "C:/Program Files/LLVM"

headers:
  entry-points:
    - ../musicchain/include/musicchain.h

compiler-opts:
  - -I../musicchain/include

preamble: |
  // ignore_for_file: camel_case_types, non_constant_identifier_names,
  //                  unnecessary_brace_in_string_interps, unused_element,
  //                  always_specify_types

functions:
  include:
    - mc_init
    - mc_cleanup
    - mc_free
    - mc_last_error
    - mc_wallet_load
    - mc_wallet_save
    - mc_wallet_free
    - mc_wallet_get_address
    - mc_wallet_get_public_key
    - mc_wallet_sign
    - mc_decoder_open
    - mc_decoder_free
    - mc_decoder_get_sample_rate
    - mc_decoder_get_channels
    - mc_decoder_get_duration_ms
    - mc_decoder_read
    - mc_decoder_seek
    - mc_decoder_position_ms
    - mc_compute_checksum
    - mc_fingerprint_generate
    - mc_fingerprint_from_compressed
    - mc_fingerprint_free
    - mc_fingerprint_get_compressed
    - mc_fingerprint_compare
    - mc_block_find_separator
    - mc_block_extract_audio
    - mc_sha256
    - mc_bytes_to_hex
    - mc_hex_to_bytes
    - mc_validate_ogg
    - mc_ogg_duration_ms
